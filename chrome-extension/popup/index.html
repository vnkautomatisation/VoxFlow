<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>VoxFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #0f0f1e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      min-height: 400px;
    }

    /* Header */
    .header {
      background: #1a1a2e;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2d2d4e;
    }
    .logo { color: #a78bfa; font-weight: 700; font-size: 15px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      display: inline-block; margin-right: 5px;
    }
    .status-label { font-size: 11px; }
    .header-right { display: flex; align-items: center; gap: 8px; }

    select.status-sel {
      background: #2d2d4e; border: 1px solid #374151;
      color: #e5e7eb; font-size: 11px; padding: 3px 6px;
      border-radius: 4px; cursor: pointer; outline: none;
    }

    .btn-logout {
      background: none; border: none; color: #6b7280;
      cursor: pointer; font-size: 16px; line-height: 1;
      padding: 2px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #111827;
      border-bottom: 1px solid #2d2d4e;
    }
    .tab {
      flex: 1; padding: 8px 4px;
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      color: #6b7280; font-size: 11px; cursor: pointer;
      position: relative; transition: color .15s;
    }
    .tab.active {
      color: #fff;
      border-bottom-color: #7c3aed;
      background: #1f2937;
    }
    .tab-badge {
      position: absolute; top: 3px; right: 3px;
      background: #ef4444; color: #fff; font-size: 9px;
      border-radius: 50%; width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Content */
    .content { padding: 12px; }

    /* Login */
    .login-wrap { padding: 20px; }
    .login-title { text-align: center; margin-bottom: 20px; }
    .login-title .brand { font-size: 24px; font-weight: 700; color: #a78bfa; }
    .login-title .sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .field input {
      width: 100%; background: #1f2937; border: 1px solid #374151;
      border-radius: 6px; padding: 8px 10px; color: #fff; font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    .field input:focus { border-color: #7c3aed; }
    .btn-primary {
      width: 100%; background: #7c3aed; border: none; color: #fff;
      padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #6d28d9; }

    /* Error */
    .error-bar {
      display: none; background: #ef444433; border: 1px solid #ef4444;
      border-radius: 6px; padding: 8px 10px; font-size: 12px;
      color: #ef4444; margin-bottom: 12px;
    }

    /* Dialer */
    .dial-input {
      width: 100%; background: #1f2937; border: 1px solid #374151;
      border-radius: 8px; color: #fff; font-size: 20px; text-align: center;
      font-family: monospace; padding: 10px; letter-spacing: 2px;
      margin-bottom: 10px; outline: none;
    }
    .dial-input:focus { border-color: #7c3aed; }

    .keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: #374151; border-radius: 8px;
      overflow: hidden; margin-bottom: 10px;
    }
    .key {
      background: #1a1a2e; padding: 11px; text-align: center;
      font-size: 16px; cursor: pointer; color: #e5e7eb;
      transition: background .1s; border: none;
      display: flex; flex-direction: column; align-items: center;
    }
    .key:hover { background: #2d2d4e; }
    .key .sub-label { font-size: 8px; color: #6b7280; line-height: 1; }
    .key.special { color: #a78bfa; font-size: 14px; }

    .btn-call {
      width: 100%; background: #16a34a; border: none; color: #fff;
      padding: 11px; border-radius: 8px; cursor: pointer; font-size: 13px;
      font-weight: 600; display: flex; align-items: center; justify-content: center;
      gap: 7px; transition: background .15s;
    }
    .btn-call:hover { background: #15803d; }
    .btn-call:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    /* Recents */
    .section-label {
      font-size: 10px; color: #6b7280; text-transform: uppercase;
      letter-spacing: .06em; margin: 14px 0 8px;
    }
    .recent-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid #1f2937;
    }
    .recent-name { font-size: 12px; font-weight: 500; }
    .recent-meta { font-size: 10px; color: #6b7280; }
    .btn-sm {
      background: #16a34a22; border: 1px solid #16a34a55;
      color: #4ade80; padding: 3px 8px; border-radius: 5px;
      font-size: 10px; cursor: pointer;
    }
    .btn-sm.blue {
      background: #1e3a5f; border-color: #3b82f644;
      color: #60a5fa;
    }

    /* In-call view */
    .incall-wrap { background: #0a0a18; }
    .incall-contact {
      padding: 16px; text-align: center; background: #0a0a18;
    }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #312e81; margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #a78bfa;
    }
    .caller-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .caller-company { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .call-status { font-size: 12px; color: #4ade80; }
    .call-timer {
      font-size: 24px; font-weight: 600; font-family: monospace;
      color: #60a5fa; margin-top: 8px;
    }

    .call-actions {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: #374151;
    }
    .call-btn {
      background: #1a1a2e; border: none; color: #9ca3af;
      padding: 11px 4px; font-size: 10px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: background .15s;
    }
    .call-btn:hover { background: #2d2d4e; }
    .call-btn.active-mute { background: #ef444422; color: #ef4444; }
    .call-btn.active-hold { background: #fbbf2422; color: #fbbf24; }

    .btn-hangup {
      margin: 10px 12px; width: calc(100% - 24px);
      background: #dc2626; border: none; color: #fff;
      padding: 10px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: 13px; font-weight: 500;
    }

    /* Caller Insights */
    .insights {
      margin: 0 12px 10px; background: #1a1a2e;
      border: 1px solid #2d2d4e; border-radius: 10px; padding: 12px;
    }
    .insights-title {
      font-size: 10px; color: #6b7280; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    .insight-row {
      display: flex; justify-content: space-between;
      font-size: 12px; color: #9ca3af; margin-bottom: 5px;
    }
    .insight-val { color: #e5e7eb; font-weight: 500; }
    .insight-val.purple { color: #a78bfa; }
    .insight-val.green  { color: #4ade80; }

    .btn-view-full {
      width: 100%; background: #2d2d4e; border: 1px solid #374151;
      color: #a78bfa; padding: 6px; border-radius: 6px;
      font-size: 11px; cursor: pointer; margin-top: 8px;
    }

    /* Incoming */
    .incoming-wrap { padding: 20px; text-align: center; }
    .incoming-pulse {
      font-size: 12px; color: #4ade80; margin-bottom: 12px;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .incoming-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn-refuse {
      flex: 1; background: #dc2626; border: none; color: #fff;
      padding: 11px; border-radius: 10px; cursor: pointer;
      font-size: 13px; font-weight: 500;
    }
    .btn-answer {
      flex: 1; background: #16a34a; border: none; color: #fff;
      padding: 11px; border-radius: 10px; cursor: pointer;
      font-size: 13px; font-weight: 500;
    }

    /* History */
    .hist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #1f2937;
    }
    .hist-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: #1f2937; display: flex; align-items: center;
      justify-content: center; font-size: 13px; flex-shrink: 0;
    }
    .hist-info { flex: 1; min-width: 0; }
    .hist-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-meta { font-size: 10px; color: #6b7280; }
    .hist-notes { font-size: 10px; color: #9ca3af; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-actions { display: flex; flex-direction: column; gap: 3px; }

    /* Voicemails */
    .vm-item { padding: 8px 0; border-bottom: 1px solid #1f2937; }
    .vm-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .vm-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .vm-new { background: #4f46e5; color: #c7d2fe; font-size: 9px; padding: 1px 5px; border-radius: 10px; }
    .vm-time { font-size: 10px; color: #6b7280; }
    .vm-transcript {
      font-size: 11px; color: #9ca3af; font-style: italic;
      border-left: 2px solid #4f46e5; padding-left: 7px; margin-top: 4px;
    }
    .btn-play {
      background: #312e81; border: none; color: #a78bfa;
      padding: 3px 9px; border-radius: 5px; font-size: 10px; cursor: pointer;
    }

    /* Search */
    .search-input {
      width: 100%; background: #1f2937; border: 1px solid #374151;
      border-radius: 8px; color: #fff; font-size: 13px;
      padding: 9px 12px; margin-bottom: 12px; outline: none;
    }
    .search-input:focus { border-color: #7c3aed; }
    .contact-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #1f2937;
    }
    .contact-name { font-size: 13px; font-weight: 500; }
    .contact-sub { font-size: 11px; color: #6b7280; }

    /* Notes panel */
    .notes-panel {
      display: none; padding: 10px 12px;
      border-top: 1px solid #1f2937;
    }
    .notes-panel.open { display: block; }
    .notes-panel textarea {
      width: 100%; background: #1f2937; border: 1px solid #374151;
      border-radius: 6px; color: #fff; font-size: 12px;
      padding: 8px; resize: none; outline: none; margin: 6px 0;
    }

    /* Transfer panel */
    .transfer-panel {
      display: none; padding: 10px 12px;
      border-top: 1px solid #1f2937;
    }
    .transfer-panel.open { display: block; }
    .transfer-panel input {
      width: 100%; background: #1f2937; border: 1px solid #374151;
      border-radius: 6px; color: #fff; font-size: 13px;
      padding: 8px 10px; outline: none; margin-bottom: 6px;
    }

    .empty-state {
      text-align: center; padding: 32px 16px; color: #6b7280; font-size: 13px;
    }

    svg { display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
