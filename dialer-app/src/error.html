<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>VoxFlow Dialer — Erreur</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #111118;
      color: #eeeef8;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #7b61ff;
      box-shadow: 0 0 12px #7b61ff;
    }
    .logo-text { font-size: 26px; font-weight: 700; }
    .vox { color: #7b61ff; }
    .flow { color: #00d4aa; }
    .icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255, 77, 109, .12);
      border: 2px solid rgba(255, 77, 109, .3);
      display: flex; align-items: center; justify-content: center;
      color: #ff4d6d;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      font-size: 12px;
      color: #9898b8;
      line-height: 1.5;
      max-width: 280px;
      margin-bottom: 24px;
    }
    button {
      -webkit-app-region: no-drag;
      padding: 10px 24px;
      background: #7b61ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #6145ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="dot"></div>
      <span class="logo-text"><span class="vox">Vox</span><span class="flow">Flow</span></span>
    </div>
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Serveur VoxFlow inaccessible</h1>
    <p>Démarrez le frontend VoxFlow sur <strong style="color:#eeeef8">http://localhost:3001</strong> puis relancez le dialer.</p>
    <button onclick="window.close()">Fermer</button>
  </div>
</body>
</html>
