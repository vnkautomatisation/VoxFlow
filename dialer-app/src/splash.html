<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>VoxFlow Dialer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #111118;
      color: #eeeef8;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .wrap {
      text-align: center;
    }
    .logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 24px;
    }
    .dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #7b61ff;
      box-shadow: 0 0 12px #7b61ff;
    }
    .logo-text { font-size: 26px; font-weight: 700; }
    .vox { color: #7b61ff; }
    .flow { color: #00d4aa; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2e2e44;
      border-top-color: #7b61ff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    .msg {
      font-size: 12px;
      color: #55557a;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="dot"></div>
      <span class="logo-text"><span class="vox">Vox</span><span class="flow">Flow</span></span>
    </div>
    <div class="spinner"></div>
    <div class="msg">Chargement du dialer...</div>
  </div>
</body>
</html>
