<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none">
  <defs>
    <linearGradient id="vG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b7fff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <linearGradient id="fG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e0b5"/>
      <stop offset="100%" stop-color="#00b891"/>
    </linearGradient>
    <linearGradient id="dG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
  </defs>

  <!-- Icône signal -->
  <g transform="translate(4,10)">
    <rect x="22" y="20" width="5"  height="16" rx="2.5" fill="url(#dG)"/>
    <rect x="13" y="26" width="5"  height="9"  rx="2.5" fill="#7b61ff" opacity="0.65"/>
    <rect x="31" y="26" width="5"  height="9"  rx="2.5" fill="#00d4aa" opacity="0.65"/>
    <rect x="4"  y="30" width="5"  height="4"  rx="2"   fill="#7b61ff" opacity="0.3"/>
    <rect x="40" y="30" width="5"  height="4"  rx="2"   fill="#00d4aa" opacity="0.3"/>
  </g>

  <!-- VoxFlow collé — un seul élément text avec deux tspan -->
  <text font-family="'DM Sans',ui-sans-serif,system-ui,sans-serif"
        font-size="40" font-weight="900" letter-spacing="-1.8"
        x="60" y="53" dominant-baseline="auto">
    <tspan fill="url(#vG)">Vox</tspan><tspan fill="url(#fG)">Flow</tspan>
  </text>
</svg>